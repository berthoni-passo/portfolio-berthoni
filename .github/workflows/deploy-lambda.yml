name: Deploy FastAPI to AWS Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Create Deployment Package
        run: |
          cd backend
          mkdir package
          pip install -r requirements.txt -t package/
          cp -r *.py data/ routers/ services/ package/
          find package -type d -exec touch {}/__init__.py \;
          cd package
          zip -r9 ../deployment_package.zip .
          cd ..
          
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name portfolio-backend-api \
            --zip-file fileb://backend/deployment_package.zip
            
          # Wait for the update to complete before modifying config
          aws lambda wait function-updated \
            --function-name portfolio-backend-api
            
          aws lambda update-function-configuration \
            --function-name portfolio-backend-api \
            --environment "Variables={ORACLE_USER=admin,ORACLE_PASSWORD=OraclePassword2026!,ORACLE_HOST_PORT=35.180.51.206:1521,ORACLE_SERVICE=FREEPDB1,S3_BUCKET_NAME=portfolio-berthoni-assets,AWS_REKOGNITION_REGION=eu-west-1,ENV=production}"

